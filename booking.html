<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt Bàn | B'Lao Garden</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: #f8f9fa;
      }
    </style>
  </head>
  <body>
    <div
      class="container d-flex align-items-center justify-content-center min-vh-100 py-5"
    >
      <div
        class="card shadow-lg border-0"
        style="border-radius: 15px; overflow: hidden; max-width: 1280px; width: 100%;"
      >
        <div class="row g-0">
          <div
            class="col-md-5 d-none d-md-block"
            style="
              background: url(&quot;https://images.pexels.com/photos/1581384/pexels-photo-1581384.jpeg?auto=compress&cs=tinysrgb&w=800&quot;)
                center/cover;
            "
          ></div>
          <div class="col-md-7 p-5 bg-white">
            <h2 class="font-serif mb-4">Đặt Bàn Trực Tuyến</h2>
            <form class="needs-validation" novalidate>
              <div class="mb-3">
                <label class="form-label">Họ và Tên</label
                ><input type="text" class="form-control" required />
              </div>
                <div class="mb-3">
                    <label class="form-label">Số điện thoại</label
                    ><input type="tel" class="form-control" required />
                </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Số khách</label
                  ><input
                    type="number"
                    class="form-control"
                    min="1"
                    value="2"
                  />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Giờ</label
                  ><input type="time" class="form-control" required />
                </div>
              </div>
              <button
                class="btn btn-warning w-100 py-3 fw-bold mt-4"
                type="submit"
              >
                XÁC NHẬN ĐẶT BÀN
              </button>
              <a
                href="index.html"
                class="btn btn-link w-100 mt-2 text-muted small"
                >&larr; Quay về trang chủ</a
              >
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
